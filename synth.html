<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Audio Synthesizer</title>
    <style>
        /* A bit of quick styling just to make it readable in your browser */
        body { font-family: sans-serif; background: #1e1e24; color: #fff; text-align: center; padding: 20px; }
        .synth-container { max-width: 600px; margin: 0 auto; background: #2a2a35; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .controls { display: flex; justify-content: space-around; margin: 20px 0; padding: 15px; background: #333344; border-radius: 6px; }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        .keyboard { display: flex; justify-content: center; margin-top: 20px; }
        .key { width: 40px; height: 150px; background: white; color: black; border: 1px solid #ccc; margin: 2px; border-radius: 0 0 4px 4px; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; font-weight: bold; }
        .key.black { width: 30px; height: 90px; background: black; color: white; margin-left: -15px; margin-right: -15px; z-index: 2; }
    </style>
</head>
<body>

    <h1>Virtual Web Synthesizer</h1>
    
    <div class="synth-container">
        <div class="controls">
            <div class="control-group">
                <label for="volume">Master Volume</label>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
            </div>
            
            <div class="control-group">
                <label for="waveform">Waveform</label>
                <select id="waveform">
                    <option value="sine">Sine</option>
                    <option value="square">Square</option>
                    <option value="sawtooth">Sawtooth</option>
                    <option value="triangle">Triangle</option>
                </select>
            </div>
        </div>

        <div class="keyboard">
            <div class="key" data-note="C4">C</div>
            <div class="key black" data-note="C#4">C#</div>
            <div class="key" data-note="D4">D</div>
            <div class="key black" data-note="D#4">D#</div>
            <div class="key" data-note="E4">E</div>
            <div class="key" data-note="F4">F</div>
            <div class="key black" data-note="F#4">F#</div>
            <div class="key" data-note="G4">G</div>
            <div class="key black" data-note="G#4">G#</div>
            <div class="key" data-note="A4">A</div>
            <div class="key black" data-note="A#4">A#</div>
            <div class="key" data-note="B4">B</div>
            <div class="key" data-note="C5">C</div>
        </div>
    </div>
<script src="app.js"></script>
</body>
</html>
